version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vector_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    container_name: rag_chat_app
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data

volumes:
  qdrant_data: